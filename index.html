<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>FPS Duel v0.1</title>
<style>
html,body{
margin:0;
overflow:hidden;
background:#111;
font-family:Arial;
color:white;
}
#game{
position:absolute;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
font-size:30px;
}
#crosshair{
position:absolute;
left:50%;
top:50%;
transform:translate(-50%,-50%);
font-size:28px;
color:white;
}
#info{
position:absolute;
left:10px;
top:10px;
font-size:18px;
}
button{
padding:15px 25px;
font-size:20px;
cursor:pointer;
}
</style>
</head>

<body>

<div id="info">
❤️ HP : 100<br>
🔫 AK-47
</div>

<div id="crosshair">+</div>

<div id="game">
<button onclick="start()">게임 시작</button>
</div>

<script>
function start(){

document.getElementById("game").innerHTML=
`
<h1>🎮 FPS Duel v0.1</h1>
`;

document.body.requestPointerLock?.();

alert("다음 버전에서 실제 FPS가 추가됩니다!");
}
</script>

</body>
</html>
