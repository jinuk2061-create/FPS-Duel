<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>FPS Duel v0.2</title>

<style>
html,body{
margin:0;
overflow:hidden;
background:#111;
font-family:Arial;
color:white;
}

#game{
position:absolute;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
font-size:30px;
}

#crosshair{
position:absolute;
left:50%;
top:50%;
transform:translate(-50%,-50%);
font-size:28px;
}

#info{
position:absolute;
left:10px;
top:10px;
font-size:20px;
}

#log{
position:absolute;
left:10px;
bottom:10px;
font-size:18px;
color:lime;
}

button{
padding:15px 25px;
font-size:20px;
cursor:pointer;
}
</style>
</head>

<body>

<div id="info">
❤️ HP : <span id="hp">100</span><br>
🔫 AK-47
</div>

<div id="crosshair">+</div>

<div id="game">
<button onclick="start()">게임 시작</button>
</div>

<div id="log"></div>

<script>

let hp=100;

function log(text){
document.getElementById("log").innerHTML=text;
}

function start(){

document.getElementById("game").innerHTML="<h1>🎮 FPS Duel v0.2</h1>";

document.body.requestPointerLock?.();

log("WASD로 이동 | Space 점프 | Shift 달리기");
}

document.addEventListener("keydown",(e)=>{

switch(e.key.toLowerCase()){

case "w":
log("⬆ 앞으로 이동");
break;

case "a":
log("⬅ 왼쪽 이동");
break;

case "s":
log("⬇ 뒤로 이동");
break;

case "d":
log("➡ 오른쪽 이동");
break;

case " ":
log("🦘 점프");
break;

case "shift":
log("⚡ 달리기");
break;

}

});

document.addEventListener("mousedown",(e)=>{

if(e.button===0){
log("💥 발사!");
}

if(e.button===2){
log("🎯 조준");
}

});

</script>

</body>
</html>
